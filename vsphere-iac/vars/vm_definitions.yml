clusters:

  kubernetes:
    network:
      name: kubernetes-net
      cidr: 192.168.20.0/24
      gateway: 192.168.20.1

    controllers:
      count: 3
      role: controller
      cpu: 4
      memory: 8192
      ip_start: 192.168.20.10

    workers:
      count: 6
      role: worker
      cpu: 4
      memory: 8192
      ip_start: 192.168.20.20


  infrastructure:
    network:
      name: infra-net
      cidr: 192.168.30.0/24
      gateway: 192.168.30.1

    haproxy:
      count: 3
      role: haproxy
      cpu: 2
      memory: 4096
      ip_start: 192.168.30.10

    idm:
      count: 3
      role: idm
      cpu: 2
      memory: 8192
      ip_start: 192.168.30.20

    nexus:
      count: 1
      role: nexus
      cpu: 4
      memory: 16384
      ip_start: 192.168.30.30


  management:
    network:
      name: mgmt-net
      cidr: 192.168.10.0/24
      gateway: 192.168.10.1

    jumphost:
      count: 1
      role: jumphost
      cpu: 2
      memory: 4096
      ip_start: 192.168.10.10
      public_ip: true
