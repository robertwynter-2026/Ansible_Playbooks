---
- name: Provision 17 Named AWS EC2 Instances
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars.yml

  tasks:
    - name: Launch named EC2 instances sequentially
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        region: "{{ aws_region }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        key_name: "{{ key_name }}"
        security_groups: "{{ security_group }}"
        vpc_subnet_id: "{{ subnet_id }}"
        tags:
          Name: "{{ item }}"
          Environment: "{{ env_tag }}"
          Project: "{{ project_tag }}"
      loop: "{{ target_vms }}"
      register: ec2_details

    - name: Wait for instances to be running and gather details
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Project": "{{ project_tag }}"
          instance-state-name: "running"
      register: running_ec2

    - name: Display public IP addresses of the named VMs
      ansible.builtin.debug:
        msg: "Host: {{ item.tags.Name }} - ID: {{ item.instance_id }} - Public IP: {{ item.public_ip_address | default('No Public IP') }}"
      loop: "{{ running_ec2.instances }}"
      loop_control:
        label: "{{ item.tags.Name }}"

