---
- name: Provision 17 vSphere Virtual Machines
  hosts: localhost
  gather_facts: false
  vars_files:
    - vsphere_vars.yml

  tasks:
    - name: Clone and power on VMs from template
      community.vmware.vmware_guest:
        hostname: "{{ vsphere_vcenter }}"
        username: "{{ vsphere_username }}"
        password: "{{ vsphere_password }}"
        validate_certs: "{{ vsphere_validate_certs }}"
        datacenter: "{{ vsphere_datacenter }}"
        cluster: "{{ vsphere_cluster }}"
        datastore: "{{ vsphere_datastore }}"
        folder: "{{ vsphere_folder }}"
        name: "{{ item }}"
        template: "{{ vsphere_template }}"
        state: poweredon
        networks:
          - name: "{{ vsphere_network }}"
            # If your network doesn't have DHCP, you can append:
            # type: static
            # ip: "10.0.0.x" (This would require altering your list structure to key-value pairs)
      loop: "{{ target_vms }}"
      register: vsphere_details

    - name: Print summary of deployed VMs
      ansible.builtin.debug:
        msg: "Successfully initiated provisioning for VM: {{ item }}"
      loop: "{{ target_vms }}"

