---
- name: Provision 17 Proxmox Virtual Machines
  hosts: localhost
  gather_facts: false
  vars_files:
    - proxmox_vars.yml

  tasks:
    - name: Clone and configure VMs from template
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        node: "{{ proxmox_node }}"
        name: "{{ item }}"
        # Dynamically calculate unique VM IDs (e.g., 100, 101, 102...) using loop index
        vmid: "{{ 100 + my_index }}"
        clone: "{{ proxmox_template_id }}"
        full: true
        storage: "{{ proxmox_storage }}"
        cores: "{{ vm_cores }}"
        memory: "{{ vm_memory }}"
        timeout: 600
        # Automatically power on the VM after cloning completes
        state: started
      loop: "{{ target_vms }}"
      loop_control:
        index_var: my_index

    - name: Print confirmation
      ansible.builtin.debug:
        msg: "Triggered clone for VM: {{ item }}"
      loop: "{{ target_vms }}"

