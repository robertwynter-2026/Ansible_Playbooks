---
# Proxmox API Connectivity Info
proxmox_api_host: "192.168.1.100"      # IP or hostname of your Proxmox node/cluster
proxmox_api_user: "root@pam"           # API user
proxmox_api_password: "MySecurePassword123!" # Use Ansible Vault in production
proxmox_node: "pve-node-01"            # Target Proxmox physical node

# Clone Configurations
proxmox_template_id: 9000              # VM ID of your base Ubuntu/Debian cloud-init template
proxmox_storage: "local-lvm"           # Target storage for the VM disks

# Hardware Allocations (Optional customization during clone)
vm_cores: 2
vm_memory: 2048

# The List of 17 Specific Hostnames to Create
target_vms:
  - "nexus"
  - "jumphost"
  - "k8s-controller-0"
  - "k8s-controller-1"
  - "k8s-controller-2"
  - "k8s-worker-0"
  - "k8s-worker-1"
  - "k8s-worker-2"
  - "k8s-worker-3"
  - "k8s-worker-4"
  - "k8s-worker-5"
  - "k8s-worker-6"
  - "idm-0"
  - "idm-1"
  - "idm-2"
  - "haproxy-0"
  - "haproxy-1"

